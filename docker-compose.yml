version: "3.9"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ./backend/.env
    environment:
      # Fallbacks for dev if .env is missing some keys
      - MONGO_URI=mongodb://mongo:27017/ristobrain
      - JWT_SECRET=devsecret
      - DEFAULT_LOCALE=it-IT
      - DEFAULT_CURRENCY=EUR
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - STORAGE_DRIVER=local
      - STORAGE_LOCAL_PATH=/data/storage
    volumes:
      - ./backend:/app
      - storage_data:/data/storage
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
      mailhog:
        condition: service_started
      minio:
        condition: service_healthy

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mongo_data:/data/db

  mailhog:
    image: mailhog/mailhog
    ports:
      - "8025:8025"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mongo_data: {}
  minio_data: {}
  storage_data: {}
